name: NodeJS with Webpack

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 22.x]

    steps:

    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}

      uses: actions/setup-node@v4

      with:
        node-version: ${{ matrix.node-version }}

    - name: Install Backend

      working-directory: ./tracker/server

      run: npm install

    - name: Install Frontend

      working-directory: ./Vite/Vite_Para_P3

      run: npm install

    - name: Build Frontend

      working-directory: ./Vite/Vite_Para_P3

      run: npm run build